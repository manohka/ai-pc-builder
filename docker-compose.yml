services:
  postgres:
    image: postgres:17

    container_name: ai-pc-builder-postgres

    environment:
      POSTGRES_DB: ai_pc_builder
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres

    ports:
      - "5433:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
